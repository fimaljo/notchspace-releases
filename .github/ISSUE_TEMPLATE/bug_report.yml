name: Bug Report
description: Report a problem in NotchSpace
title: "[Bug] "
labels: ["bug"]

body:

* type: textarea
  id: description
  attributes:
  label: What happened?
  description: Describe the issue clearly
  placeholder: The app crashes when I open...
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to reproduce
  placeholder: |
  1. Open app
  2. Click ...
  3. Crash happens
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected behavior
  placeholder: What should have happened?

* type: input
  id: version
  attributes:
  label: App version
  placeholder: e.g. 1.0.0

* type: input
  id: macos
  attributes:
  label: macOS version
  placeholder: e.g. macOS 14.5

* type: textarea
  id: logs
  attributes:
  label: Logs (optional)
  placeholder: Paste any logs if available
